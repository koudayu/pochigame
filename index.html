```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.map{
    width:min(95vw,95vh);
    aspect-ratio:1;

    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);

    border:2px solid white;
}

.cell{
    border:1px solid #444;
    background:#7a5230;
}

.pochi{
    background:#ffd966;
}

.bed{
    background:#66ccff;
}

.table{
    background:#cc9966;
}
</style>
</head>

<body>

<div class="map" id="map"></div>

<script>

const map = document.getElementById("map");

for(let y=0;y<15;y++){

    for(let x=0;x<15;x++){

        const cell=document.createElement("div");

        cell.className="cell";

        if(x===7 && y===7){
            cell.classList.add("pochi");
        }

        if(
            (x===5||x===6)
            &&
            (y===10||y===11)
        ){
            cell.classList.add("bed");
        }

        if(
            (x===9||x===10)
            &&
            (y===10||y===11)
        ){
            cell.classList.add("table");
        }

        map.appendChild(cell);

    }

}

</script>

</body>
</html>
```
