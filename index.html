<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#map{

    width:min(95vw,95vh);
    aspect-ratio:1;

    position:relative;

    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);

    border:3px solid white;
}

.cell{
    border:1px solid #666;
    background:#caa472;
}

#pochi{

    position:absolute;

    width:13.3%;
    height:13.3%;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    image-rendering:pixelated;

}

</style>
</head>

<body>

<div id="map">

</div>

<script>

const map = document.getElementById("map");

for(let i=0;i<225;i++){

    const cell=document.createElement("div");

    cell.className="cell";

    map.appendChild(cell);

}

const pochi=document.createElement("img");

pochi.id="pochi";

pochi.src="pochi.png";

map.appendChild(pochi);

</script>

</body>
</html>
