```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ポチ巣サイズ確認</title>

<style>

body{
    margin:0;
    background:#222;
    color:white;
    font-family:sans-serif;

    display:flex;
    flex-direction:column;
    align-items:center;

    min-height:100vh;
}

.controls{
    margin:20px;
}

button{
    margin:2px;
    padding:8px 12px;
}

#map{
    width:min(90vw,90vh);
    aspect-ratio:1;

    display:grid;

    border:2px solid white;
}

.cell{
    border:1px solid #444;
    background:#7a5230;
    box-sizing:border-box;
}

.pochi{
    background:gold;
}

</style>
</head>

<body>

<div class="controls">

<button onclick="createMap(3)">3×3</button>
<button onclick="createMap(5)">5×5</button>
<button onclick="createMap(7)">7×7</button>
<button onclick="createMap(9)">9×9</button>
<button onclick="createMap(11)">11×11</button>
<button onclick="createMap(13)">13×13</button>
<button onclick="createMap(15)">15×15</button>

</div>

<div id="map"></div>

<script>

function createMap(size){

    const map=document.getElementById("map");

    map.innerHTML="";

    map.style.gridTemplateColumns=`repeat(${size},1fr)`;
    map.style.gridTemplateRows=`repeat(${size},1fr)`;

    const center=Math.floor(size/2);

    for(let y=0;y<size;y++){

        for(let x=0;x<size;x++){

            const cell=document.createElement("div");

            cell.className="cell";

            if(x===center && y===center){
                cell.classList.add("pochi");
            }

            map.appendChild(cell);

        }

    }

}

createMap(15);

</script>

</body>
</html>
```
